name: Deploy frontend → Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build y deploy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Build para Cloudflare Workers
        run: npm run cf:build
        working-directory: frontend
        # Las vars NEXT_PUBLIC_* vienen de .env.production (committed).
        # Solo se usan secrets para credenciales de despliegue.

      - name: Deploy a Cloudflare Workers
        run: npx wrangler deploy
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
